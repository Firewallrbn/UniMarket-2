global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'unimarket-usuarios'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: 'unimarket-ventas'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']

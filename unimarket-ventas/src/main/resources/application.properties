server.port=8081
app.usuarios-service.url=http://localhost:8080
spring.application.name=unimarket-ventas

# ----- OBSERVABILITY (Metrics & Tracing) -----
management.endpoints.web.exposure.include=health,info,prometheus,metrics,circuitbreakers,retries
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces

# Tags para identificar métricas en Prometheus/Grafana
management.metrics.tags.application=${spring.application.name}

# ----- RESILIENCE4J: CIRCUIT BREAKER -----
# Ventana deslizante de 5 llamadas para evaluar la tasa de fallos
resilience4j.circuitbreaker.instances.usuariosService.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.usuariosService.slidingWindowSize=5
# Si el 50% de las llamadas fallan, el circuito se ABRE
resilience4j.circuitbreaker.instances.usuariosService.failureRateThreshold=50
# El circuito permanece ABIERTO 10 segundos antes de pasar a HALF_OPEN
resilience4j.circuitbreaker.instances.usuariosService.waitDurationInOpenState=10s
# En HALF_OPEN, permite 3 llamadas de prueba para ver si el servicio se recuperó
resilience4j.circuitbreaker.instances.usuariosService.permittedNumberOfCallsInHalfOpenState=3
# Registrar el estado del Circuit Breaker en el health indicator de Actuator
resilience4j.circuitbreaker.instances.usuariosService.registerHealthIndicator=true
# Llamadas que tarden más de 3s se consideran "lentas"
resilience4j.circuitbreaker.instances.usuariosService.slowCallDurationThreshold=3s
resilience4j.circuitbreaker.instances.usuariosService.slowCallRateThreshold=80

# ----- RESILIENCE4J: RETRY -----
# Máximo 3 intentos antes de declarar falla
resilience4j.retry.instances.usuariosService.maxAttempts=3
# Espera 2 segundos entre reintentos
resilience4j.retry.instances.usuariosService.waitDuration=2s
# Solo reintentar en estas excepciones (problemas de red/timeout)
resilience4j.retry.instances.usuariosService.retryExceptions=java.util.concurrent.TimeoutException,java.io.IOException,org.springframework.web.client.ResourceAccessException

# ----- RESILIENCE4J: MÉTRICAS (Micrometer -> Prometheus -> Grafana) -----
resilience4j.circuitbreaker.metrics.enabled=true
resilience4j.retry.metrics.enabled=true

# ----- SPRING SECURITY: JWT -----
# Clave secreta para firmar/validar JWT (mínimo 32 caracteres / 256 bits para HS256)
# En producción, usar variable de entorno: JWT_SECRET
jwt.secret=miClaveSuperSecretaParaUniMarketJWTBasadaEnUnStringLargo1234567890